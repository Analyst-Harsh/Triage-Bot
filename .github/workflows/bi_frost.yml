name: BiFrost

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Format, Lint, Type check and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Overrides the workflow-level `contents: read` default: the coverage
    # comment step needs to post/update a PR comment and push coverage data
    # to the action's dedicated `python-coverage-comment-action-data` branch.
    # Scoped to this job only -- no other step needs write access.
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # python-coverage-comment-action's git operations (updating its
          # data branch) reuse the token checkout leaves behind.
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: "${{ runner.os }}"

      - name: Install dependencies
        run: uv sync --locked

      - name: Format check
        id: format-check
        run: uv run ruff format --check .

      - name: Lint
        id: lint
        run: uv run ruff check .

      - name: Type check
        id: type-check
        run: uv run pyright

      - name: Secret scan
        id: secret-scan
        run: uv run detect-secrets-hook --baseline .secrets.baseline $(git ls-files)

      - name: Test
        id: test
        run: uv run pytest -q --cov --cov-report=term-missing

      - name: Coverage comment
        # Only meaningful on a PR (posts/updates the diff-coverage comment)
        # or a push to main (updates the coverage badge/data branch) --
        # skipped on workflow_dispatch against an arbitrary ref, and skipped
        # entirely if the Test step above failed.
        if: success() && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: py-cov-action/python-coverage-comment-action@5d8df5979747514c914e1c5a12335a7cf9a2745f # v4.1
        with:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Job summary
        if: always()
        run: |
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "⚠️";; esac; }
          {
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Format check | $(icon ${{ steps.format-check.outcome }}) |"
            echo "| Lint | $(icon ${{ steps.lint.outcome }}) |"
            echo "| Type check | $(icon ${{ steps.type-check.outcome }}) |"
            echo "| Secret scan | $(icon ${{ steps.secret-scan.outcome }}) |"
            echo "| Test | $(icon ${{ steps.test.outcome }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
